<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ragnarok Classic GGT — AI Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #0f1117;
      --bg-chat: #1a1d27;
      --bg-input: #12141f;
      --bg-bubble-user: #4f46e5;
      --bg-bubble-assistant: #1e2235;
      --bg-image: #111;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2a2d3e;
      --border-light: #333654;
      --score-bg: #2a1f4e;
      --score-text: #a78bfa;
      --error-bg: #2d1515;
      --error-border: #7f1d1d;
      --error-text: #fca5a5;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(135deg, #0f1117 0%, #1a1230 50%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.06), transparent);
      pointer-events: none;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title h1 {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c4b5fd, #818cf8, #c4b5fd);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .header-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--score-text);
      background: var(--score-bg);
      padding: 2px 7px;
      border-radius: 99px;
      border: 1px solid rgba(124, 58, 237, 0.3);
    }

    .btn-clear {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      font-family: inherit;
    }

    .btn-clear:hover {
      color: var(--error-text);
      border-color: var(--error-border);
      background: var(--error-bg);
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: var(--bg-chat);
    }

    /* Message */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      padding: 0 4px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      line-height: 1.65;
      word-break: break-word;
      position: relative;
    }

    .message.user .bubble {
      background: var(--bg-bubble-user);
      color: #ede9fe;
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: 0 2px 12px rgba(79, 70, 229, 0.25);
    }

    .message.assistant .bubble {
      background: var(--bg-bubble-assistant);
      color: var(--text-primary);
      border-bottom-left-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .message.error .bubble {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      border-radius: var(--radius-md);
    }

    /* Markdown content inside bubbles */
    .bubble p { margin: 0 0 0.6em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: #c4b5fd; font-weight: 600; }
    .bubble em { color: #a5b4fc; }
    .bubble code {
      background: rgba(0,0,0,0.35);
      color: #a78bfa;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .bubble pre {
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code {
      background: none;
      padding: 0;
      color: #c4b5fd;
      font-size: 0.85em;
    }
    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .bubble li { margin: 3px 0; }
    .bubble h1, .bubble h2, .bubble h3 {
      color: #c4b5fd;
      margin: 10px 0 5px;
      font-weight: 600;
    }
    .bubble h1 { font-size: 1.1em; }
    .bubble h2 { font-size: 1.0em; }
    .bubble h3 { font-size: 0.95em; }
    .bubble a {
      color: #818cf8;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .bubble a:hover { color: #c4b5fd; }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      margin: 8px 0;
      padding: 4px 12px;
      color: var(--text-secondary);
      background: rgba(124, 58, 237, 0.08);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 0.88em;
    }
    .bubble th, .bubble td {
      border: 1px solid var(--border-light);
      padding: 6px 10px;
      text-align: left;
    }
    .bubble th { background: rgba(124, 58, 237, 0.15); color: #c4b5fd; }
    .bubble tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* Image grid */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      width: 100%;
    }

    .image-grid.count-1 { grid-template-columns: 1fr; max-width: 280px; }
    .image-grid.count-2 { grid-template-columns: repeat(2, 1fr); }

    .image-item {
      background: var(--bg-image);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      aspect-ratio: auto;
    }

    .image-item:hover {
      transform: scale(1.03);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.25);
    }

    .image-item img {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      display: block;
    }

    /* Sources */
    .sources-wrap {
      margin-top: 10px;
      width: 100%;
    }

    .sources-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 11px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .sources-toggle:hover {
      background: rgba(124, 58, 237, 0.08);
      border-color: var(--accent);
      color: #c4b5fd;
    }

    .sources-toggle .chevron {
      margin-left: auto;
      transition: transform 0.2s;
      font-size: 0.7rem;
    }

    .sources-toggle.open .chevron { transform: rotate(180deg); }

    .sources-list {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
      padding: 4px 0;
    }

    .sources-list.open { display: flex; }

    .source-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.8rem;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .source-item:hover {
      background: rgba(124, 58, 237, 0.08);
      border-color: rgba(124, 58, 237, 0.4);
      color: #c4b5fd;
    }

    .source-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-score {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--score-text);
      background: var(--score-bg);
      padding: 1px 6px;
      border-radius: 99px;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 14px 20px 18px;
      background: var(--bg-input);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-chat);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      overflow-y: auto;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--text-muted); }

    .btn-send {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      color: white;
    }

    .btn-send:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
    }

    .btn-send:active:not(:disabled) { transform: scale(0.92); }

    .btn-send:disabled {
      background: var(--border-light);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-send svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .input-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
      cursor: zoom-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-md);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      cursor: default;
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 1.6rem;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
      background: none;
      border: none;
      font-family: inherit;
    }

    .lightbox-close:hover { color: white; }

    /* Mobile */
    @media (max-width: 600px) {
      .header { padding: 12px 14px; }
      .header-title h1 { font-size: 0.95rem; }
      .chat-area { padding: 16px 12px; }
      .message { max-width: 90%; }
      .input-area { padding: 10px 12px 14px; }
      .image-grid { grid-template-columns: repeat(2, 1fr); }
      .image-grid.count-1 { grid-template-columns: 1fr; }
    }

    @media (max-width: 380px) {
      .image-grid, .image-grid.count-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <span style="font-size:1.3rem; line-height:1;">⚔️</span>
      <h1>Ragnarok Classic GGT</h1>
      <span class="header-badge">AI</span>
    </div>
    <button class="btn-clear" id="btn-clear" title="Clear conversation">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
      ล้างประวัติ
    </button>
  </header>

  <!-- Chat -->
  <main class="chat-area" id="chat-area" aria-live="polite" aria-label="Chat messages"></main>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        rows="1"
        placeholder="ถามเกี่ยวกับ Ragnarok Classic..."
        aria-label="Your message"
      ></textarea>
      <button class="btn-send" id="btn-send" aria-label="Send message">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter ส่ง &nbsp;·&nbsp; Shift+Enter ขึ้นบรรทัดใหม่</p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none;" role="dialog" aria-modal="true" aria-label="Image preview">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close image">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  // ── Constants ─────────────────────────────────────────────────────────────
  var STORAGE_KEY = 'ro-chat-history'
  var COOKIE_KEY  = 'ro-chat-session'
  var API_URL     = '/chat'
  var MAX_HISTORY = 40

  var GREETING = {
    role: 'assistant',
    content: 'สวัสดีครับ! ผมคือ AI ผู้ช่วยของ Ragnarok Classic GGT 🎮 ถามได้เลยครับ'
  }

  // ── State ─────────────────────────────────────────────────────────────────
  var chatHistory = []
  var isLoading = false

  // ── DOM refs ──────────────────────────────────────────────────────────────
  var chatArea  = document.getElementById('chat-area')
  var textarea  = document.getElementById('user-input')
  var btnSend   = document.getElementById('btn-send')
  var btnClear  = document.getElementById('btn-clear')
  var lightbox  = document.getElementById('lightbox')
  var lightboxImg = document.getElementById('lightbox-img')
  var lightboxClose = document.getElementById('lightbox-close')

  // ── Session cookie ────────────────────────────────────────────────────────
  function getSessionId () {
    var match = document.cookie.match(/ro-chat-session=([^;]+)/)
    if (match) return match[1]
    var id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
      var r = Math.random() * 16 | 0
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16)
    })
    document.cookie = COOKIE_KEY + '=' + id + '; path=/; max-age=2592000; SameSite=Lax'
    return id
  }

  var sessionId = getSessionId()

  // ── Marked config ─────────────────────────────────────────────────────────
  marked.setOptions({
    breaks: true,
    gfm: true
  })

  function renderMarkdown (text) {
    var raw = marked.parse(text || '')
    var clean = DOMPurify.sanitize(raw)
    // Force all links to open in a new tab
    var div = document.createElement('div')
    div.innerHTML = clean
    div.querySelectorAll('a').forEach(function (a) {
      a.setAttribute('target', '_blank')
      a.setAttribute('rel', 'noopener noreferrer')
    })
    return div.innerHTML
  }

  // ── localStorage ──────────────────────────────────────────────────────────
  function loadHistory () {
    try {
      var raw = localStorage.getItem(STORAGE_KEY)
      return raw ? JSON.parse(raw) : []
    } catch (e) {
      return []
    }
  }

  function saveHistory () {
    var trimmed = chatHistory.slice(-MAX_HISTORY)
    chatHistory = trimmed
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed))
    } catch (e) {}
  }

  // ── Scroll ────────────────────────────────────────────────────────────────
  function scrollToBottom () {
    chatArea.scrollTop = chatArea.scrollHeight
  }

  // ── Timestamp ─────────────────────────────────────────────────────────────
  function nowTime () {
    return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
  }

  // ── Append message bubble ─────────────────────────────────────────────────
  function appendMessage (role, content, extras) {
    var wrap = document.createElement('div')
    wrap.className = 'message ' + (role === 'user' ? 'user' : role === 'error' ? 'error' : 'assistant')

    var meta = document.createElement('div')
    meta.className = 'message-meta'
    meta.textContent = (role === 'user' ? 'คุณ' : role === 'error' ? '' : 'AI') + (role !== 'error' ? ' · ' + nowTime() : '')
    if (role !== 'error') wrap.appendChild(meta)

    var bubble = document.createElement('div')
    bubble.className = 'bubble'

    if (role === 'user') {
      bubble.textContent = content
    } else if (role === 'error') {
      bubble.textContent = '⚠️ ' + content
    } else {
      bubble.innerHTML = renderMarkdown(content)
    }

    wrap.appendChild(bubble)

    // Images
    if (extras && extras.images && extras.images.length > 0) {
      var grid = document.createElement('div')
      var n = extras.images.length
      grid.className = 'image-grid' + (n === 1 ? ' count-1' : n === 2 ? ' count-2' : '')

      extras.images.forEach(function (img) {
        var item = document.createElement('div')
        item.className = 'image-item'
        item.title = img.alt || ''
        item.setAttribute('role', 'button')
        item.setAttribute('tabindex', '0')
        item.setAttribute('aria-label', 'เปิดรูปขนาดใหญ่: ' + (img.alt || 'image'))

        var el = document.createElement('img')
        el.src = img.url
        el.alt = img.alt || ''
        el.loading = 'lazy'

        item.appendChild(el)
        item.addEventListener('click', function () { openLightbox(img.url, img.alt || '') })
        item.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault()
            openLightbox(img.url, img.alt || '')
          }
        })
        grid.appendChild(item)
      })

      wrap.appendChild(grid)
    }

    // Sources
    if (extras && extras.sources && extras.sources.length > 0) {
      var sourcesWrap = document.createElement('div')
      sourcesWrap.className = 'sources-wrap'

      var toggle = document.createElement('button')
      toggle.className = 'sources-toggle'
      toggle.setAttribute('aria-expanded', 'false')
      toggle.innerHTML = '📚 Sources (' + extras.sources.length + ') <span class="chevron">▼</span>'

      var list = document.createElement('div')
      list.className = 'sources-list'
      list.setAttribute('aria-hidden', 'true')

      extras.sources.forEach(function (src) {
        var a = document.createElement('a')
        a.className = 'source-item'
        a.href = src.url || '#'
        a.target = '_blank'
        a.rel = 'noopener noreferrer'

        var title = document.createElement('span')
        title.className = 'source-title'
        title.textContent = src.title || src.url || 'Source'

        var score = document.createElement('span')
        score.className = 'source-score'
        score.textContent = Math.round((src.score || 0) * 100) + '%'

        a.appendChild(title)
        a.appendChild(score)
        list.appendChild(a)
      })

      toggle.addEventListener('click', function () {
        var open = list.classList.toggle('open')
        toggle.classList.toggle('open', open)
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false')
        list.setAttribute('aria-hidden', open ? 'false' : 'true')
      })

      sourcesWrap.appendChild(toggle)
      sourcesWrap.appendChild(list)
      wrap.appendChild(sourcesWrap)
    }

    chatArea.appendChild(wrap)
    scrollToBottom()
    return wrap
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  function showTyping () {
    var wrap = document.createElement('div')
    wrap.className = 'message assistant'
    wrap.id = 'typing-indicator'

    var meta = document.createElement('div')
    meta.className = 'message-meta'
    meta.textContent = 'AI'

    var bubble = document.createElement('div')
    bubble.className = 'bubble typing-bubble'
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'

    wrap.appendChild(meta)
    wrap.appendChild(bubble)
    chatArea.appendChild(wrap)
    scrollToBottom()
  }

  function hideTyping () {
    var el = document.getElementById('typing-indicator')
    if (el) el.remove()
  }

  // ── Lightbox ──────────────────────────────────────────────────────────────
  function openLightbox (src, alt) {
    lightboxImg.src = src
    lightboxImg.alt = alt
    lightbox.style.display = 'flex'
    document.body.style.overflow = 'hidden'
    lightboxClose.focus()
  }

  function closeLightbox () {
    lightbox.style.display = 'none'
    lightboxImg.src = ''
    document.body.style.overflow = ''
  }

  lightboxClose.addEventListener('click', closeLightbox)
  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) closeLightbox()
  })
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && lightbox.style.display !== 'none') closeLightbox()
  })

  // ── Send message ──────────────────────────────────────────────────────────
  function setLoading (val) {
    isLoading = val
    btnSend.disabled = val
    textarea.disabled = val
  }

  async function sendMessage () {
    var query = textarea.value.trim()
    if (!query || isLoading) return

    textarea.value = ''
    autoResize()

    // Add user to history + UI
    chatHistory.push({ role: 'user', content: query })
    appendMessage('user', query)

    setLoading(true)
    showTyping()

    // Build history payload (exclude the greeting from API history)
    var apiHistory = chatHistory.slice(0, -1).filter(function (m) {
      return !(m.role === 'assistant' && m.content === GREETING.content)
    })

    try {
      var res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Session-Id': sessionId
        },
        body: JSON.stringify({ query: query, history: apiHistory })
      })

      if (!res.ok) {
        throw new Error('Server error ' + res.status)
      }

      var data = await res.json()
      var answer = data.answer || '(ไม่มีคำตอบ)'

      hideTyping()
      var extras = { images: data.images || [], sources: data.sources || [] }
      chatHistory.push({ role: 'assistant', content: answer, images: extras.images, sources: extras.sources })
      saveHistory()

      appendMessage('assistant', answer, extras)

    } catch (err) {
      hideTyping()
      appendMessage('error', 'ไม่สามารถติดต่อ API ได้: ' + err.message)
    } finally {
      setLoading(false)
      textarea.focus()
    }
  }

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  function autoResize () {
    textarea.style.height = 'auto'
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px'
  }

  textarea.addEventListener('input', autoResize)

  textarea.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  })

  btnSend.addEventListener('click', sendMessage)

  // ── Clear ─────────────────────────────────────────────────────────────────
  btnClear.addEventListener('click', function () {
    if (!confirm('ล้างประวัติการสนทนาทั้งหมดใช่ไหม?')) return
    localStorage.removeItem(STORAGE_KEY)
    location.reload()
  })

  // ── Init ──────────────────────────────────────────────────────────────────
  function init () {
    var saved = loadHistory()

    if (saved.length === 0) {
      // Fresh session — show greeting, don't persist it
      chatHistory = []
      appendMessage('assistant', GREETING.content)
    } else {
      chatHistory = saved
      // Replay messages from storage (restore images + sources for assistant messages)
      saved.forEach(function (msg) {
        var extras = msg.role === 'assistant'
          ? { images: msg.images || [], sources: msg.sources || [] }
          : null
        appendMessage(msg.role, msg.content, extras)
      })
    }

    textarea.focus()
  }

  init()
</script>
</body>
</html>
