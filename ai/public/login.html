<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ — RO Classic AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #0f1117;
      --bg-chat: #1a1d27;
      --bg-input: #12141f;
      --bg-bubble-user: #4f46e5;
      --bg-bubble-assistant: #1e2235;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2a2d3e;
      --border-light: #333654;
      --score-bg: #2a1f4e;
      --score-text: #a78bfa;
      --error-bg: #2d1515;
      --error-border: #7f1d1d;
      --error-text: #fca5a5;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.6;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(79, 70, 229, 0.08) 0%, transparent 60%),
        var(--bg-base);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--bg-chat);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(124, 58, 237, 0.1);
      animation: fadeIn 0.3s ease both;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-badge {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--score-bg);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 50%;
      font-size: 1.1rem;
      line-height: 1;
    }

    .logo-area h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 12px;
      background: linear-gradient(135deg, #c4b5fd, #818cf8, #c4b5fd);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-area .subtitle {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 4px;
    }

    form {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .field input::placeholder {
      color: var(--text-muted);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
    }

    .btn-submit:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-banner {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--radius-sm);
      color: var(--error-text);
      padding: 9px 12px;
      font-size: 0.83rem;
      margin-top: 12px;
    }

    @media (max-width: 420px) {
      .login-card {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-badge">⚔️</div>
      <h1>RO Classic AI</h1>
      <p class="subtitle">เข้าสู่ระบบเพื่อใช้งาน</p>
    </div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">ชื่อผู้ใช้</label>
        <input
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="username"
          required
        />
      </div>
      <div class="field">
        <label for="password">รหัสผ่าน</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">เข้าสู่ระบบ</button>
      <div class="error-banner" id="error-banner" role="alert" aria-live="polite"></div>
    </form>
  </div>

<script>
  var AUTH_TOKEN_KEY = 'ro-auth-token'

  var form      = document.getElementById('login-form')
  var btnSubmit = document.getElementById('btn-submit')
  var errorBanner = document.getElementById('error-banner')

  // Redirect if already authenticated
  if (localStorage.getItem(AUTH_TOKEN_KEY)) {
    window.location.replace('/')
  }

  function showError (message) {
    errorBanner.textContent = message
    errorBanner.style.display = 'block'
  }

  function hideError () {
    errorBanner.style.display = 'none'
    errorBanner.textContent = ''
  }

  function setSubmitting (val) {
    btnSubmit.disabled = val
    btnSubmit.textContent = val ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault()

    var username = document.getElementById('username').value.trim()
    var password = document.getElementById('password').value

    if (!username || !password) return

    setSubmitting(true)
    hideError()

    try {
      var res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })

      if (res.ok) {
        var data = await res.json()
        localStorage.setItem(AUTH_TOKEN_KEY, data.token)
        window.location.replace('/')
        return
      }

      if (res.status === 401) {
        showError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง')
      } else {
        showError('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง')
      }
    } catch (err) {
      showError('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง')
    } finally {
      setSubmitting(false)
    }
  })
</script>
</body>
</html>
